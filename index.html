<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 26, 41, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* 1. Animated Background Blobs */
        .background-blobs {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(79,70,229,0.8) 0%, rgba(30,27,75,0) 70%);
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(16,185,129,0.6) 0%, rgba(6,78,59,0) 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, 30px) scale(1.1); }
        }

        /* Glassmorphism Container */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-group input, .input-group select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        /* Submit Button with Loading Spinner */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #3730a3 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }

        /* 2. Final Result Animation */
        .result-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--card-border);
            text-align: center;
            display: none;
        }

        /* The flashy bounce animation */
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            70% { transform: scale(1.05) translateY(-5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .result-container.show {
            display: block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .result-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .result-approved { color: var(--success); }
        .result-rejected { color: var(--danger); }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1>Loan Approval Prediction</h1>
            <p>Our intelligent system evaluates your profile in real-time to determine your loan eligibility.</p>
        </header>

        <section class="card">
            <form id="prediction-form">
                <div class="input-group">
                    <label for="income">Annual Income ($)</label>
                    <input type="number" id="income" placeholder="e.g., 50000" required min="0">
                </div>
                
                <div class="input-group">
                    <label for="credit_score">Credit Score</label>
                    <input type="number" id="credit_score" placeholder="e.g., 720" required min="300" max="850">
                </div>
                
                <div class="input-group">
                    <label for="employment_status">Employment Status</label>
                    <select id="employment_status" required>
                        <option value="" disabled selected>Select status</option>
                        <option value="Employed">Employed</option>
                        <option value="Self-Employed">Self-Employed</option>
                        <option value="Unemployed">Unemployed</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="loan_amount">Loan Amount ($)</label>
                    <input type="number" id="loan_amount" placeholder="e.g., 15000" required min="0">
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Predict Loan Status</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div id="result-container" class="result-container">
                <div id="result-icon" class="result-icon"></div>
                <h2 id="result-text" class="result-text"></h2>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('prediction-form');
            const submitBtn = document.getElementById('submit-btn');
            const resultContainer = document.getElementById('result-container');
            const resultIcon = document.getElementById('result-icon');
            const resultText = document.getElementById('result-text');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const income = document.getElementById('income').value;
                const creditScore = document.getElementById('credit_score').value;
                const employmentStatus = document.getElementById('employment_status').value;
                const loanAmount = document.getElementById('loan_amount').value;

                // Set loading animation
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
                resultContainer.classList.remove('show'); // Hide old result to replay animation

                try {
                    // Try to connect to Python Backend
                    const response = await fetch('/api/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            income: income,
                            credit_score: creditScore,
                            employment_status: employmentStatus,
                            loan_amount: loanAmount
                        })
                    });

                    const data = await response.json();

                    setTimeout(() => {
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                        if (response.ok) {
                            showResult(data.prediction);
                        } else {
                            alert(data.error || 'Something went wrong.');
                        }
                    }, 800);

                } catch (error) {
                    // 3. STANDALONE FALLBACK MODE
                    // If python is NOT running, simulate it so the animation still plays!
                    console.log('Backend not detected. Simulating prediction for demo purposes...');
                    
                    setTimeout(() => {
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                        
                        // Fake logic for demo
                        const score = (income / 50000) + (creditScore / 300) - (loanAmount / 20000);
                        const isApproved = score > 1.2 || creditScore > 650;
                        
                        showResult(isApproved ? 'Approved' : 'Rejected');
                    }, 1200);
                }
            });

            function showResult(prediction) {
                // Trigger the Pop-In Animation
                resultContainer.classList.add('show');
                resultText.className = 'result-text';
                
                if (prediction === 'Approved') {
                    resultIcon.innerHTML = '🎉';
                    resultText.innerText = 'Loan Approved!';
                    resultText.classList.add('result-approved');
                } else {
                    resultIcon.innerHTML = '🛑';
                    resultText.innerText = 'Loan Rejected';
                    resultText.classList.add('result-rejected');
                }
            }
        });
    </script>
</body>
</html>
